<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Model Mobil - Geely Bandung</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── CSS RESET & VARIABLES (Diambil dari index.html) ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#050505; --white:#ffffff; --off-white:#f5f5f5;
  --g900:#111111; --g800:#1a1a1a; --g700:#2a2a2a; --g600:#3d3d3d;
  --g400:#7a7a7a; --g300:#a8a8a8; --g200:#d4d4d4; --g100:#f0f0f0;
  --display:'Space Grotesk',sans-serif;
  --serif:'Playfair Display',serif;
  --body:'Inter',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--off-white);color:var(--black);font-family:var(--body);overflow-x:hidden;line-height:1.8}

/* ── NAVBAR ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,5,5,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:24px 64px;max-width:1500px;margin:0 auto}
.logo{font-family:var(--display);font-size:.95rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;color:var(--white)}
.nav-links{display:flex;gap:48px;align-items:center}
.nav-links a{font-family:var(--display);font-size:.75rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.7);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-cta{font-family:var(--display);font-size:.72rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--black);background:var(--white);padding:12px 28px;text-decoration:none;transition:background .2s,transform .2s;border-radius:2px}
.nav-cta:hover{background:var(--g200);transform:translateY(-2px)}

/* ── HEADER HALAMAN KATALOG ── */
.page-header { background: var(--black); color: var(--white); padding: 160px 64px 80px; text-align: center; }
.page-header h1 { font-family: var(--display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
.page-header p { color: var(--g300); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

/* ── GRID & KARTU MOBIL ── */
.section{padding:100px 0}
.wrap{max-width:1500px;margin:0 auto;padding:0 64px}
.models-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.mcard{position:relative;overflow:hidden;background:var(--white);cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.06);transition:transform .5s cubic-bezier(.25,.46,.45,.94),box-shadow .5s; animation: fadeIn 0.6s ease-out forwards; opacity: 0; transform: translateY(20px);}
.mcard:hover{transform:translateY(-10px);box-shadow:0 20px 60px rgba(0,0,0,0.12)}
.mcard-img{width:100%;aspect-ratio:16/10;position:relative;overflow:hidden;transition:transform .7s cubic-bezier(.25,.46,.45,.94); background-color:#111; background-repeat:no-repeat; border-top-left-radius:8px; border-top-right-radius:8px;}
.mcard:hover .mcard-img{transform:scale(1.08)}
.mcard-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.15) 55%,transparent 100%);pointer-events:none;}
.mcard-body{position:relative;padding:32px 32px 36px;background:var(--white);color:var(--black);}
.mcard-tag{font-family:var(--display);font-size:.65rem;letter-spacing:.26em;text-transform:uppercase;color:var(--g400);margin-bottom:10px}
.mcard-name{font-family:var(--display);font-size:1.8rem;font-weight:700;letter-spacing:-.02em;margin-bottom:10px;line-height:1.1;color:var(--black)}
.mcard-desc{font-size:.95rem;color:var(--g600);margin-bottom:24px;line-height:1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
.mcard-price{font-family:var(--display);font-size:.9rem;font-weight:700;letter-spacing:.08em;color:var(--black);padding-top:20px;border-top:1px solid var(--g100)}

@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

/* ── FOOTER ── */
footer{background:var(--black);border-top:1px solid rgba(255,255,255,0.08);padding:48px 64px}
.foot-inner{max-width:1500px;margin:0 auto;display:flex;align-items:center;justify-content:center}
footer p{font-family:var(--display);font-size:.7rem;letter-spacing:.12em;color:rgba(255,255,255,0.5)}

@media(max-width:1024px){
  .models-grid{grid-template-columns:1fr 1fr;gap:24px}
  .nav-links{display:none}
}
@media(max-width:640px){
  .nav-inner,.page-header,.wrap,footer{padding-left:24px;padding-right:24px}
  .models-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo"><img src="assets/logo-geely-header-white-transparent.webp" alt="Geely Logo" style="height: 32px; width: auto;"></a>
    <nav class="nav-links">
      <a href="index.html">Kembali ke Beranda</a>
    </nav>
    <a href="index.html#contact" class="nav-cta">Test Drive</a>
  </div>
</header>

<section class="page-header">
  <h1>Katalog Kendaraan</h1>
  <p>Jelajahi seluruh koleksi kendaraan Geely. Temukan model yang paling sesuai dengan gaya hidup dan kebutuhan Anda.</p>
</section>

<section class="section">
  <div class="wrap">
    <div class="models-grid" id="full-models-grid">
      <p style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--g400);">Memuat katalog kendaraan...</p>
    </div>
  </div>
</section>

<footer>
  <div class="foot-inner">
    <p>© 2026 Geely Bandung. All Rights Reserved.</p>
  </div>
</footer>

<div id="car-wa-modal" style="display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px;">
  <div style="background: var(--black); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; max-width: 450px; width: 100%; position: relative; overflow: hidden; animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);">
    
    <button id="close-wa-modal" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 20px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);">&times;</button>
    
    <img id="modal-car-img" src="" alt="Mobil" style="width: 100%; height: 260px; object-fit: cover;">
    
    <div style="padding: 32px;">
      <p id="modal-car-type" style="font-family: var(--display); font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--g400); margin-bottom: 8px;"></p>
      <h3 id="modal-car-name" style="font-family: var(--display); font-size: 2rem; font-weight: 700; color: var(--white); margin-bottom: 8px; line-height: 1.1;"></h3>
      <p id="modal-car-price" style="font-family: var(--display); font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1);"></p>
      <p id="modal-car-desc" style="color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px;"></p>
      
      <a id="modal-wa-btn" href="#" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 12px; background: #25D366; color: white; padding: 18px; border-radius: 4px; font-family: var(--display); font-weight: 600; font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; transition: transform 0.2s, background 0.2s;">
        <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824z"/></svg>
        Hubungi via WhatsApp
      </a>
    </div>
  </div>
</div>
<style>
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  #modal-wa-btn:hover { background: #20BA5A; transform: translateY(-3px); }
</style>

<script>
    const SUPABASE_URL = 'https://gzgrqnxngelctwdmegva.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6Z3JxbnhuZ2VsY3R3ZG1lZ3ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTkwNzcsImV4cCI6MjA5NzA3NTA3N30.X71JgALxRkoWcCqE8TnRd4RZr9d5M2lrrzX3ICbSFmg';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchAllCars() {
        try {
            const { data, error } = await supabaseClient
                .from('car_models')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;
            
            const grid = document.getElementById('full-models-grid');
            grid.innerHTML = ''; 

            if (data.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--g400);">Belum ada data kendaraan.</p>';
                return;
            }

            data.forEach((car, index) => {
                const card = document.createElement('div');
                card.className = 'mcard';
                card.style.animationDelay = `${index * 0.1}s`; 
                
                card.onclick = () => openWaModal(car);

                card.innerHTML = `
                    <div class="mcard-img" style="background-image:url('${car.photo_url || '#'}'); background-size: cover; background-position: center; background-repeat: no-repeat;"></div>
                    <div class="mcard-body">
                        <p class="mcard-tag">${car.type}</p>
                        <h3 class="mcard-name">${car.name}</h3>
                        <p class="mcard-desc">${car.description || 'Deskripsi tidak tersedia.'}</p>
                        <p class="mcard-price">Rp.${car.price}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (err) {
            console.error(err);
            document.getElementById('full-models-grid').innerHTML = '<p style="color: red; text-align:center; grid-column: 1/-1;">Gagal memuat katalog. Silakan refresh halaman.</p>';
        }
    }

    const waModal = document.getElementById('car-wa-modal');

    function openWaModal(car) {
        document.getElementById('modal-car-img').src = car.photo_url || '#';
        document.getElementById('modal-car-type').innerText = car.type;
        document.getElementById('modal-car-name').innerText = car.name;
        document.getElementById('modal-car-price').innerText = car.price;
        document.getElementById('modal-car-desc').innerText = car.description || '';
        
        const noWa = "6285722667209"; 
        const textPesan = `Halo Sales Geely Bandung, saya tertarik dan ingin menanyakan informasi lebih detail mengenai mobil *${car.name}* yang saya lihat di website katalog.`;
        document.getElementById('modal-wa-btn').href = `https://wa.me/${noWa}?text=${encodeURIComponent(textPesan)}`;
        
        waModal.style.display = 'flex';
    }

    document.getElementById('close-wa-modal').addEventListener('click', () => waModal.style.display = 'none');
    
    waModal.addEventListener('click', (e) => { 
        if (e.target === waModal) waModal.style.display = 'none'; 
    });

    fetchAllCars();
</script>

</body>
</html>
